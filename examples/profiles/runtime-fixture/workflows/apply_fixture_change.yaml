workflow:
  id: runtime_fixture.apply_fixture_change
  intent: apply_fixture_change
  mode: apply
  risk: medium
  description: Exercise an admitted mutation against the no-I/O fixture backend.

  steps:
    - id: pre_change_checkpoint
      type: internal
      action: record_execution_checkpoint
      pause_safe: true

    - id: apply_change
      type: connector
      connector: fixture_source
      action: apply_fixture_change
      timeout: 30s
      pause_safe: false

    - id: post_change_checkpoint
      type: internal
      action: record_execution_checkpoint
      pause_safe: true

    - id: produce_receipt
      type: evidence
      action: produce_receipt
      pause_safe: true

  retry:
    max_attempts: 2
    allowed_on:
      - timeout
      - transient_connector_error
    blocked_on:
      - policy_denied

  rollback:
    mode: dry_run
    steps:
      - id: rollback_marker
        type: internal
        action: record_rollback_marker
        pause_safe: true
