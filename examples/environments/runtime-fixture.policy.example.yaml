environment:
  id: runtime-fixture-policy
  description: No-I/O fixture with a fail-closed GovEngine policy pack.
  profile: runtime_fixture

  targets:
    fixture-group:
      type: group
      members: [fixture-target]
    fixture-target:
      type: fixture
      criticality: low
    fixture-target-2:
      type: fixture
      criticality: low

  connectors:
    fixture_source:
      enabled: true
      backend: static_fixture
      fixture_only: true
      actions:
        read_fixture_state:
          data: {observed: true, state: ready}
        apply_fixture_change:
          mutating: true
          data:
            before_state: {changed: false}
            after_state: {changed: true}

  safety:
    default_mode: dry_run
    apply_requires_govengine: true
    secrets_source: external
    max_concurrent_operations: 1
    target_lock_enabled: true

  policy_pack:
    policy_id: rexecop-runtime-fixture
    version: "2026-06-24"
    rules:
      - rule_id: allow-inspect-fixture-state
        effect: allow
        conditions:
          action.category: operation
          action.mode: read
          action.intent: inspect_fixture_state
        reason_code: fixture_read_allowed
      - rule_id: allow-read-fixture-connector
        effect: allow
        conditions:
          action.category: connector
          action.mode: read
          action.name: read_fixture_state
        reason_code: fixture_connector_read_allowed
      - rule_id: deny-mutating-fixture-actions
        effect: deny
        conditions:
          action.mode: mutating
        reason_code: fixture_mutation_denied
