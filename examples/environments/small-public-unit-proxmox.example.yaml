environment:
  id: small-public-unit-proxmox
  description: Example environment for bootstrap testing only.
  profile: tecrax

  targets:
    all_critical_vms:
      type: group
      members:
        - vm-zabbix-01
        - vm-pbs-01

  connectors:
    proxmox:
      enabled: true
      mode: mock
      fixture: tecrax_fixture
    pbs:
      enabled: true
      mode: mock
      fixture: tecrax_fixture

  safety:
    default_mode: dry_run
    apply_requires_govengine: true
    secrets_source: external
    max_concurrent_operations: 1
    target_lock_enabled: true
    maintenance_windows:
      - timezone: UTC
        start: "00:00"
        end: "23:59"
