name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/checkout@v4
        with:
          repository: rozmiarD/tecrax
          path: ci-deps/tecrax
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4
        with:
          repository: rozmiarD/SCLite
          path: ci-deps/sclite
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4
        with:
          repository: rozmiarD/GovEngine
          path: ci-deps/govengine
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system tools
        run: sudo apt-get install -y ripgrep

      - name: Install
        run: |
          python -m pip install -e ./ci-deps/sclite
          python -m pip install -e ./ci-deps/govengine
          python -m pip install -e ".[dev]"
          # Cross-source profile smoke; dependency metadata is checked by package gates.
          python -m pip install --no-deps -e ./ci-deps/tecrax

      - name: Validate public truth
        run: python scripts/validate_public_truth.py

      - name: Validate stack contracts
        run: python scripts/validate_stack_contracts.py

      - name: Validate profile conformance
        run: python scripts/validate_profile_conformance.py

      - name: Validate first-run smoke
        run: python scripts/validate_first_run_smoke.py

      - name: Validate cross-repo golden fixture
        run: python scripts/validate_cross_repo_golden_fixture.py

      - name: Ruff
        run: ruff check . --exclude ci-deps

      - name: Mypy
        run: mypy src/rexecop

      - name: Core boundary check
        run: |
          if rg -il '\b(tecrax|proxmox|pbs|zabbix|adguard|frigate|hillstone|docker|ubuntu|ntp)\b' src/rexecop --glob '!**/connectors/command_shape.py'; then
            echo "domain token detected in rexecop core"
            exit 1
          fi
          if rg -n 'rexecop-fixture-guard-key' src/rexecop/adapters/sclite_port/full_bundle.py; then
            echo "fixture guard key must not ship in production full_bundle module"
            exit 1
          fi

      - name: Secret scan (tracked tree and history)
        if: matrix.python-version == '3.11'
        run: bash scripts/secret_scan.sh

      - name: Package install smoke
        run: |
          rexecop version
          rexecop --help

      - name: Pytest
        run: pytest

  package-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: rozmiarD/SCLite
          path: ci-deps/sclite
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4
        with:
          repository: rozmiarD/GovEngine
          path: ci-deps/govengine
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling and runtime dependencies
        run: |
          python -m pip install --upgrade pip build twine pip-audit cyclonedx-bom
          python -m pip install -e ./ci-deps/sclite
          python -m pip install -e ./ci-deps/govengine

      - name: Clean build artifacts
        run: rm -rf dist build *.egg-info

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Check package secret and path hygiene
        run: python scripts/validate_distribution.py dist

      - name: Supply-chain gate
        run: python scripts/validate_supply_chain_gate.py dist

      - name: Artifact install smoke
        run: python scripts/validate_artifact_install_smoke.py --dist dist
