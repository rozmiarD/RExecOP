name: Publish PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: Package version to publish (must match pyproject.toml)
        required: true
        default: "0.3.0rc3"
      govengine_ref:
        description: Exact GovEngine commit SHA for this release train
        required: true
      sclite_ref:
        description: Exact SCLite commit SHA for this release train
        required: true
        default: "2470373c6384c284ab48df7ce763f0938797d155"
      tecrax_ref:
        description: Exact Tecrax commit SHA for this release train
        required: true
      previous_version:
        description: Previous supported public RExecOp line with green release evidence
        required: true
        default: "0.2.24a0"

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  publish-rexecop:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/rexecop/
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Checkout exact GovEngine release-train source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          repository: rozmiarD/GovEngine
          ref: ${{ inputs.govengine_ref }}
          path: .govstack/govengine

      - name: Checkout exact SCLite release-train source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          repository: rozmiarD/SCLite
          ref: ${{ inputs.sclite_ref }}
          path: .govstack/sclite

      - name: Checkout exact Tecrax release-train source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          repository: rozmiarD/tecrax
          ref: ${{ inputs.tecrax_ref }}
          path: .govstack/tecrax

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      - name: Download previous-line release evidence
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .release-train
          gh api \
            "repos/$GITHUB_REPOSITORY/contents/release-evidence/rexecop-release-evidence-${{ inputs.previous_version }}.json?ref=release-evidence" \
            --jq .content | base64 --decode \
            > ".release-train/rexecop-release-evidence-${{ inputs.previous_version }}.json"

      - name: Validate version and public truth
        env:
          GOVSTACK_REPO_GOVENGINE: ${{ github.workspace }}/.govstack/govengine
          GOVSTACK_REPO_SCLITE: ${{ github.workspace }}/.govstack/sclite
          GOVSTACK_REPO_TECRAX: ${{ github.workspace }}/.govstack/tecrax
        run: |
          test "$GITHUB_REF" = "refs/heads/main"
          test "${{ inputs.govengine_ref }}" = "$(printf '%s' '${{ inputs.govengine_ref }}' | grep -E '^[0-9a-f]{40}$')"
          test "${{ inputs.sclite_ref }}" = "$(printf '%s' '${{ inputs.sclite_ref }}' | grep -E '^[0-9a-f]{40}$')"
          test "${{ inputs.tecrax_ref }}" = "$(printf '%s' '${{ inputs.tecrax_ref }}' | grep -E '^[0-9a-f]{40}$')"
          python scripts/validate_public_truth.py
          python scripts/validate_stack_contracts.py
          python scripts/validate_release_train_preflight.py \
            --release \
            --previous-evidence ".release-train/rexecop-release-evidence-${{ inputs.previous_version }}.json"
          python scripts/validate_stack_invariants.py
          python scripts/validate_external_review_gate.py --version "${{ inputs.version }}"
          test "$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')" = "${{ inputs.version }}"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine pip-audit cyclonedx-bom

      - name: Build package
        run: |
          rm -rf dist build *.egg-info
          python -m build

      - name: Check metadata
        run: python -m twine check dist/*

      - name: Check package secret and path hygiene
        run: python scripts/validate_distribution.py dist

      - name: Supply-chain gate
        run: python scripts/validate_supply_chain_gate.py dist

      - name: Attest wheel, sdist, and CycloneDX SBOM
        id: release_subject_attestation
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.cdx.json

      - name: Publish to PyPI with trusted publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

      - name: Public-index release smoke
        env:
          GOVSTACK_REPO_GOVENGINE: ${{ github.workspace }}/.govstack/govengine
          GOVSTACK_REPO_SCLITE: ${{ github.workspace }}/.govstack/sclite
          GOVSTACK_REPO_TECRAX: ${{ github.workspace }}/.govstack/tecrax
        run: |
          python scripts/validate_public_index_release_smoke.py \
            --version "${{ inputs.version }}" \
            --dist-dir dist \
            --sbom "dist/rexecop-${{ inputs.version }}.cdx.json" \
            --attestation-id "${{ steps.release_subject_attestation.outputs.attestation-id }}" \
            --attestation-url "${{ steps.release_subject_attestation.outputs.attestation-url }}" \
            --evidence-output ".release-train/rexecop-release-evidence-${{ inputs.version }}.json" \
            --supersedes "${{ inputs.previous_version }}" \
            --write-evidence \
            --verify-post-publish

      - name: Upload release evidence artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: rexecop-release-evidence-${{ inputs.version }}
          path: .release-train/rexecop-release-evidence-${{ inputs.version }}.json
          # The SBOM is also persisted on the release-evidence branch below.
          if-no-files-found: error

      - name: Attest release evidence
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a
        with:
          subject-path: .release-train/rexecop-release-evidence-${{ inputs.version }}.json

      - name: Persist evidence on release-evidence branch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          if git ls-remote --exit-code origin refs/heads/release-evidence; then
            git fetch origin release-evidence
            git worktree add --detach /tmp/rexecop-release-evidence FETCH_HEAD
          else
            git worktree add --detach /tmp/rexecop-release-evidence "$GITHUB_SHA"
            git -C /tmp/rexecop-release-evidence switch --orphan release-evidence
            git -C /tmp/rexecop-release-evidence rm -rf . || true
          fi
          mkdir -p /tmp/rexecop-release-evidence/release-evidence
          cp ".release-train/rexecop-release-evidence-${{ inputs.version }}.json" \
            /tmp/rexecop-release-evidence/release-evidence/
          cp "dist/rexecop-${{ inputs.version }}.cdx.json" \
            /tmp/rexecop-release-evidence/release-evidence/
          git -C /tmp/rexecop-release-evidence add release-evidence
          git -C /tmp/rexecop-release-evidence commit \
            -m "Record RExecOp ${{ inputs.version }} release evidence"
          git -C /tmp/rexecop-release-evidence push origin HEAD:release-evidence
