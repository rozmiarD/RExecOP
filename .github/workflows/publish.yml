name: Publish PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: Package version to publish (must match pyproject.toml)
        required: true
        default: "0.2.3a0"

permissions:
  contents: read

jobs:
  publish-rexecop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate version and public truth
        run: |
          python scripts/validate_public_truth.py
          test "$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')" = "${{ inputs.version }}"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build package
        run: |
          rm -rf dist build *.egg-info
          python -m build

      - name: Check metadata
        run: python -m twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload dist/*
